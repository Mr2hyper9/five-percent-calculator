name: Trigger monthly simulation repair

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/trigger-monthly-fix.yml

permissions:
  contents: write

jobs:
  run-repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run repair script stored in the one-time workflow
        run: |
          sed -n '24,309p' .github/workflows/apply-monthly-simulation-fix.yml | sed 's/^          //' > /tmp/monthly-fix.py
          python /tmp/monthly-fix.py
          rm -f .github/workflows/trigger-monthly-fix.yml

      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/InvestmentCalculator.jsx .github/workflows/apply-monthly-simulation-fix.yml .github/workflows/trigger-monthly-fix.yml
          git commit -m "Fix monthly reinvestment and contract laddering"
          git push
