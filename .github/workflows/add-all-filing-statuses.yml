name: Add all federal filing statuses

on:
  pull_request:
    branches: [master]
    paths:
      - .github/filing-status-trigger.txt

permissions:
  contents: write

jobs:
  update-calculator:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Add filing statuses and tax profiles
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/InvestmentCalculatorV3.jsx")
          lines = path.read_text().splitlines()

          def find_line(start, predicate, label):
            for index in range(start, len(lines)):
              if predicate(lines[index]):
                return index
            raise RuntimeError(f"Could not locate {label}")

          married_start = find_line(
            0,
            lambda line: line.strip() == "const marriedBrackets = [",
            "married tax brackets",
          )
          married_end = find_line(
            married_start + 1,
            lambda line: line.strip() == "];",
            "end of married tax brackets",
          )

          bracket_replacement = '''const marriedBrackets = [
            { upTo: 23200, rate: 0.1 },
            { upTo: 94300, rate: 0.12 },
            { upTo: 201050, rate: 0.22 },
            { upTo: 383900, rate: 0.24 },
            { upTo: 487450, rate: 0.32 },
            { upTo: 731200, rate: 0.35 },
            { upTo: Infinity, rate: 0.37 }
          ];

          const marriedSeparateBrackets = [
            { upTo: 11600, rate: 0.1 },
            { upTo: 47150, rate: 0.12 },
            { upTo: 100525, rate: 0.22 },
            { upTo: 191950, rate: 0.24 },
            { upTo: 243725, rate: 0.32 },
            { upTo: 365600, rate: 0.35 },
            { upTo: Infinity, rate: 0.37 }
          ];

          const headOfHouseholdBrackets = [
            { upTo: 16550, rate: 0.1 },
            { upTo: 63100, rate: 0.12 },
            { upTo: 100500, rate: 0.22 },
            { upTo: 191950, rate: 0.24 },
            { upTo: 243700, rate: 0.32 },
            { upTo: 609350, rate: 0.35 },
            { upTo: Infinity, rate: 0.37 }
          ];

          const FILING_STATUS_CONFIG = {
            single: { brackets: singleBrackets, standardDeduction: 14600 },
            married_joint: { brackets: marriedBrackets, standardDeduction: 29200 },
            married: { brackets: marriedBrackets, standardDeduction: 29200 },
            married_separate: { brackets: marriedSeparateBrackets, standardDeduction: 14600 },
            head_household: { brackets: headOfHouseholdBrackets, standardDeduction: 21900 },
            surviving_spouse: { brackets: marriedBrackets, standardDeduction: 29200 }
          };'''.splitlines()
          lines[married_start:married_end + 1] = bracket_replacement

          marginal_start = find_line(
            0,
            lambda line: line.strip().startswith("function getMarginalTaxRate("),
            "marginal tax helper",
          )
          deduction_start = find_line(
            marginal_start + 1,
            lambda line: line.strip().startswith("function standardDeductionFor("),
            "standard deduction helper",
          )
          deduction_end = find_line(
            deduction_start + 1,
            lambda line: line.strip() == "}",
            "end of standard deduction helper",
          )

          helper_replacement = '''function getFilingStatusConfig(filingStatus) {
            return FILING_STATUS_CONFIG[filingStatus] || FILING_STATUS_CONFIG.single;
          }

          function getMarginalTaxRate(taxableIncome, filingStatus) {
            const { brackets } = getFilingStatusConfig(filingStatus);
            return brackets.find((bracket) => taxableIncome <= bracket.upTo)?.rate ?? 0.37;
          }

          function standardDeductionFor(filingStatus) {
            return getFilingStatusConfig(filingStatus).standardDeduction;
          }'''.splitlines()
          lines[marginal_start:deduction_end + 1] = helper_replacement

          single_option = find_line(
            0,
            lambda line: '<option value="single">Single</option>' in line,
            "single filing option",
          )
          joint_option = find_line(
            single_option + 1,
            lambda line: "Married Filing Jointly" in line,
            "married filing jointly option",
          )
          option_indent = lines[single_option][:len(lines[single_option]) - len(lines[single_option].lstrip())]
          option_replacement = [
            f'{option_indent}<option value="single">Single</option>',
            f'{option_indent}<option value="married_joint">Married Filing Jointly</option>',
            f'{option_indent}<option value="married_separate">Married Filing Separately</option>',
            f'{option_indent}<option value="head_household">Head of Household</option>',
            f'{option_indent}<option value="surviving_spouse">Qualifying Surviving Spouse</option>',
          ]
          lines[single_option:joint_option + 1] = option_replacement

          path.write_text("\n".join(lines) + "\n")
          PY

      - name: Commit calculator update to pull request branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/InvestmentCalculatorV3.jsx
          git commit -m "Add all federal filing statuses to 5 percent model"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
