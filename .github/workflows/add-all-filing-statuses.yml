name: Add all federal filing statuses

on:
  pull_request:
    branches: [master]
    paths:
      - .github/filing-status-trigger.txt

permissions:
  contents: write

jobs:
  update-calculator:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Add filing statuses and tax profiles
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("src/InvestmentCalculatorV3.jsx")
          text = path.read_text()

          married_block = '''const marriedBrackets = [
            { upTo: 23200, rate: 0.1 },
            { upTo: 94300, rate: 0.12 },
            { upTo: 201050, rate: 0.22 },
            { upTo: 383900, rate: 0.24 },
            { upTo: 487450, rate: 0.32 },
            { upTo: 731200, rate: 0.35 },
            { upTo: Infinity, rate: 0.37 }
          ];

          const marriedSeparateBrackets = [
            { upTo: 11600, rate: 0.1 },
            { upTo: 47150, rate: 0.12 },
            { upTo: 100525, rate: 0.22 },
            { upTo: 191950, rate: 0.24 },
            { upTo: 243725, rate: 0.32 },
            { upTo: 365600, rate: 0.35 },
            { upTo: Infinity, rate: 0.37 }
          ];

          const headOfHouseholdBrackets = [
            { upTo: 16550, rate: 0.1 },
            { upTo: 63100, rate: 0.12 },
            { upTo: 100500, rate: 0.22 },
            { upTo: 191950, rate: 0.24 },
            { upTo: 243700, rate: 0.32 },
            { upTo: 609350, rate: 0.35 },
            { upTo: Infinity, rate: 0.37 }
          ];

          const FILING_STATUS_CONFIG = {
            single: { brackets: singleBrackets, standardDeduction: 14600 },
            married_joint: { brackets: marriedBrackets, standardDeduction: 29200 },
            married: { brackets: marriedBrackets, standardDeduction: 29200 },
            married_separate: { brackets: marriedSeparateBrackets, standardDeduction: 14600 },
            head_household: { brackets: headOfHouseholdBrackets, standardDeduction: 21900 },
            surviving_spouse: { brackets: marriedBrackets, standardDeduction: 29200 }
          };'''

          text, count = re.subn(
            r'const marriedBrackets = \[.*?\n\];',
            married_block,
            text,
            count=1,
            flags=re.S,
          )
          if count != 1:
            raise RuntimeError(f"Expected one married bracket block, replaced {count}")

          helper_block = '''function getFilingStatusConfig(filingStatus) {
            return FILING_STATUS_CONFIG[filingStatus] || FILING_STATUS_CONFIG.single;
          }

          function getMarginalTaxRate(taxableIncome, filingStatus) {
            const { brackets } = getFilingStatusConfig(filingStatus);
            return brackets.find((bracket) => taxableIncome <= bracket.upTo)?.rate ?? 0.37;
          }

          function standardDeductionFor(filingStatus) {
            return getFilingStatusConfig(filingStatus).standardDeduction;
          }'''

          text, count = re.subn(
            r'function getMarginalTaxRate\(taxableIncome, filingStatus\) \{.*?\n\}\n\nfunction standardDeductionFor\(filingStatus\) \{.*?\n\}',
            helper_block,
            text,
            count=1,
            flags=re.S,
          )
          if count != 1:
            raise RuntimeError(f"Expected one filing helper block, replaced {count}")

          old_options = '''                    <option value="single">Single</option>
                    <option value="married">Married Filing Jointly</option>'''
          new_options = '''                    <option value="single">Single</option>
                    <option value="married_joint">Married Filing Jointly</option>
                    <option value="married_separate">Married Filing Separately</option>
                    <option value="head_household">Head of Household</option>
                    <option value="surviving_spouse">Qualifying Surviving Spouse</option>'''
          if old_options not in text:
            raise RuntimeError("Filing status dropdown was not found")
          text = text.replace(old_options, new_options, 1)

          path.write_text(text)
          PY

      - name: Commit calculator update to pull request branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/InvestmentCalculatorV3.jsx
          git commit -m "Add all federal filing statuses to 5 percent model"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
